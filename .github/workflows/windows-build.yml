name: Flutter Windows Build

on:
  # push:
  #   branches: [ main ]
   workflow_dispatch:
      inputs:
        build_mode:
          description: "Build mode (release/debug)"
          required: true
          default: "release"

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      # 🔥 IMPORTANT: install C++ toolchain (missing in your setup)
      - name: Install Visual Studio Build Tools (C++)
        run: |
          choco install visualstudio2022buildtools --quiet --no-progress
          choco install visualstudio2022-workload-vctools --quiet --no-progress

      - name: Enable Windows desktop
        run: flutter config --enable-windows-desktop

      - name: Install dependencies
        run: flutter pub get

      - name: Flutter doctor
        run: flutter doctor -v

      # 🔥 make sure real error is visible
      - name: Build Windows app
        run: flutter build windows --${{ github.event.inputs.build_mode }}

      # 🔥 safer directory check (won’t crash workflow)
      - name: Verify output
        run: |
          if (Test-Path build/windows/x64/runner/Release) {
            echo "Build OK"
            dir build/windows/x64/runner/Release
          } else {
            echo "BUILD FAILED: Release folder not found"
            exit 1
          }

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: build/windows/x64/runner/Release/
